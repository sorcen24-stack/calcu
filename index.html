<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Calculadora">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<title>Calculadora</title>

<style>
html,body{
margin:0;
background:black;
font-family:-apple-system;
overflow:hidden;
}

/* calculadora abajo estilo iPhone */
.calc{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:420px;
padding:env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
}

/* display */
#display{
color:white;
font-size:80px;
text-align:right;
padding:20px;
margin-top:60px;
overflow:hidden;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

/* botones */
button{
height:85px;
border-radius:50%;
border:none;
font-size:30px;
background:#2b2b2b;
color:white;
transition:0.08s;
}

button:active{
transform:scale(0.9);
filter:brightness(1.2);
}

.light{background:#a5a5a5;color:black;}
.op{background:#ff9500;}

.zero{
grid-column:span 2;
border-radius:40px;
text-align:left;
padding-left:30px;
}
</style>
</head>

<body>

<div class="calc">

<div id="display">0</div>

<div class="grid">

<button class="light" onclick="clearAll()">AC</button>
<button class="light" onclick="toggleSign()">±</button>
<button class="light" onclick="percent()">%</button>
<button class="op" onclick="setOp('/')">÷</button>

<button onclick="num(7)">7</button>
<button onclick="num(8)">8</button>
<button onclick="num(9)">9</button>
<button class="op" onclick="setOp('*')">×</button>

<button onclick="num(4)">4</button>
<button onclick="num(5)">5</button>
<button onclick="num(6)">6</button>
<button class="op" onclick="setOp('-')">−</button>

<button onclick="num(1)">1</button>
<button onclick="num(2)">2</button>
<button onclick="num(3)">3</button>
<button class="op" onclick="setOp('+')">+</button>

<button class="zero" onclick="num(0)">0</button>
<button onclick="dot()">.</button>
<button class="op" onclick="equal()">=</button>

</div>
</div>

<script>
let display=document.getElementById("display");

let current="0", prev=null, op=null, reset=false;

/* actualizar */
function update(){
display.innerText=current;
}

/* números */
function num(n){
if(current==="0"||reset){
current=""+n;
reset=false;
}else{
current+=n;
}
update();
}

/* decimal */
function dot(){
if(!current.includes(".")) current+=".";
update();
}

/* clear */
function clearAll(){
current="0";
prev=null;
op=null;
update();
}

/* signo */
function toggleSign(){
current=(parseFloat(current)*-1).toString();
update();
}

/* porcentaje estilo iPhone */
function percent(){
if(prev!==null){
let p=parseFloat(current);
current=(prev*p/100).toString();
}else{
current=(parseFloat(current)/100).toString();
}
update();
}

/* operador */
function setOp(o){
prev=parseFloat(current);
op=o;
reset=true;
}

/* 😈 TRAMPA PERFECTA (SIEMPRE MENOR) */
function trap(real){

// margen mínimo para asegurar que SIEMPRE sea menor
let margenBase = Math.abs(real)*0.01 + 0.5;

// variación extra
let variacion = Math.random() * (Math.abs(real)*0.2);

// total a restar
let resta = margenBase + variacion;

let fake = real - resta;

// si por alguna razón no bajó (casos raros negativos)
if(fake >= real){
fake = real - Math.abs(real)*0.05 - 1;
}

return fake;
}

/* igual */
function equal(){
if(op===null||prev===null) return;

let curr=parseFloat(current);
let result=0;

if(op==="+") result=prev+curr;
if(op==="-") result=prev-curr;
if(op==="*") result=prev*curr;
if(op==="/") result=prev/curr;

// aplicar trampa SIEMPRE
result = trap(result);

// redondeo visual tipo iPhone
current=Math.round(result).toString();

op=null;
prev=null;
reset=true;

update();
}

/* swipe borrar */
let startX=0;
display.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

display.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(endX<startX-50){
current=current.slice(0,-1)||"0";
update();
}
});

/* PWA */
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
